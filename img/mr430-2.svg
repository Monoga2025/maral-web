<svg xmlns="http://www.w3.org/2000/svg" width="400" height="600" viewBox="0 0 400 600">
<defs>
  <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#1a1a2e"/>
    <stop offset="100%" style="stop-color:#0a0a14"/>
  </linearGradient>
  <linearGradient id="boom" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" style="stop-color:#2a2a2a"/>
    <stop offset="40%" style="stop-color:#c0c0c0"/>
    <stop offset="60%" style="stop-color:#e0e0e0"/>
    <stop offset="100%" style="stop-color:#1a1a1a"/>
  </linearGradient>
  <linearGradient id="el" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" style="stop-color:#1a1a1a"/>
    <stop offset="50%" style="stop-color:#ccc"/>
    <stop offset="100%" style="stop-color:#1a1a1a"/>
  </linearGradient>
  <radialGradient id="glow" cx="50%" cy="85%" r="40%">
    <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:0.12"/>
    <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:0"/>
  </radialGradient>
</defs>
<rect width="400" height="600" fill="url(#bg)"/>
<ellipse cx="200" cy="540" rx="60" ry="10" fill="#0ea5e9" opacity="0.08"/>
<!-- Boom vertical -->
<rect x="192" y="120" width="16" height="380" fill="url(#boom)" rx="3"/>
<!-- Elements (horizontal, different lengths) -->
<rect x="100" y="178" width="200" height="8" fill="url(#el)" rx="2"/>
<rect x="110" y="238" width="180" height="8" fill="url(#el)" rx="2"/>
<rect x="118" y="298" width="164" height="8" fill="url(#el)" rx="2"/>
<rect x="124" y="358" width="152" height="8" fill="url(#el)" rx="2"/>
<rect x="130" y="418" width="140" height="8" fill="url(#el)" rx="2"/>
<rect width="400" height="600" fill="url(#glow)"/>
<text x="200" y="575" font-family="Arial,sans-serif" font-size="11" fill="#0ea5e9" text-anchor="middle" opacity="0.7" font-weight="bold">MAXANT YAGI</text>
</svg>